name: Vextryn Air OS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Toolchain and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bison flex libgmp3-dev libmpc-dev libmpfr-dev texinfo xorriso grub-pc-bin grub-common cmake qemu-system-x86
        # TODO: Install or build x86_64-elf cross-compiler here

    - name: Build and generate ISO
      run: |
        python3 scripts/build.py --iso

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v3
      with:
        name: vextryn-air-iso
        path: build_out/vextryn_air.iso
